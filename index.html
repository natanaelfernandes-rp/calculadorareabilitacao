<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA JUDICIÁRIO RP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f141c;
            --container-bg: #161f2b;
            --input-bg: #0b1016;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #c5a880;
            --accent-hover: #b3946b;
            --success-color: #1b4d3e;
            --success-hover: #133a2f;
            --danger-color: #611f1f;
            --danger-hover: #4a1717;
            --border-color: #2a3649;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--accent-color);
            position: relative;
        }

        .nav-tabs {
            position: absolute;
            top: 15px;
            right: 25px;
            display: flex;
            gap: 5px;
        }

        .tab-btn {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #0f141c;
            border-color: var(--accent-color);
        }

        .header-system {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 15px;
        }

        .header-system i {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 13px;
            color: var(--accent-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .inline-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .inline-field {
            flex: 1;
            min-width: 130px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
        }

        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-color);
            font-size: 14px;
            transition: all 0.2s;
        }

        select:focus, input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(197, 168, 128, 0.2);
        }

        .select-cadastrado {
            border-left: 3px solid var(--accent-color);
            margin-bottom: 8px;
        }

        .manual-input-box {
            background: rgba(11, 16, 22, 0.3);
            padding: 12px;
            border-radius: 3px;
            border: 1px dashed var(--border-color);
            margin-top: 5px;
        }

        .module-section {
            display: none;
        }

        .module-section.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        .conditional-field {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-cadastro {
            background: rgba(11, 16, 22, 0.5);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .lista-cadastrados {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            padding: 15px;
            border-radius: 3px;
        }

        .categoria-titulo {
            font-size: 11px;
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        .categoria-titulo:first-child {
            margin-top: 0;
        }

        .item-membro {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(42, 54, 73, 0.2);
            font-size: 13px;
        }

        .item-membro:last-child {
            border-bottom: none;
        }

        .btn-mini-excluir {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 5px;
            min-width: auto;
            flex: none;
        }

        .btn-mini-excluir:hover {
            color: #f87171;
        }

        .prisaon-row {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(11, 16, 22, 0.4);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .btn-add-prisao, .btn-add-membro {
            background-color: var(--accent-color);
            color: #0f141c;
            padding: 8px 14px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: auto;
            margin-bottom: 15px;
        }

        .btn-backup-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        .btn-backup {
            background-color: var(--input-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 12px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-backup:hover {
            background-color: var(--accent-color);
            color: #0f141c;
        }

        .btn-excluir {
            background-color: var(--accent-color);
            color: #0f141c;
            padding: 10px 15px;
            font-size: 12px;
            width: auto;
            flex: none;
        }

        .live-counter {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin: 20px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .live-counter span {
            color: var(--accent-color);
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-generate {
            background-color: var(--accent-color);
            color: #0f141c;
        }

        .btn-generate:hover { background-color: var(--accent-hover); }

        .btn-clear {
            background-color: var(--danger-color);
            color: white;
            border: 1px solid #7d2626;
        }

        .btn-clear:hover { background-color: var(--danger-hover); }

        .output-container {
            margin-top: 30px;
            display: none;
        }

        .output-box-wrapper { margin-bottom: 20px; }

        .output-box-title {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
        }

        textarea {
            width: 100%;
            height: 220px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: #c5a880;
            font-family: 'Courier New', Courier, monospace;
            padding: 18px;
            font-size: 14px;
            resize: vertical;
            line-height: 1.5;
        }

        .mini-copy-btn {
            background-color: var(--success-color);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            margin-top: 5px;
            width: auto;
            display: inline-block;
        }

        .mini-copy-btn:hover { background-color: var(--success-hover); }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #1b4d3e;
            border: 1px solid var(--accent-color);
            color: white;
            padding: 14px 28px;
            border-radius: 3px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-weight: bold;
            font-size: 14px;
            display: none;
            z-index: 1000;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchModule('despachos', this)">Despachos</button>
            <button class="tab-btn" onclick="switchModule('taxas', this)">Calculadora de Taxa</button>
            <button class="tab-btn" id="tabGerenciamentoBtn" onclick="switchModule('gerenciamento', this)" style="border-left: 2px solid var(--accent-color);"><i class="fa-solid fa-users-gear"></i> Gerenciar Equipe</button>
        </div>

        <div class="header-system">
            <i class="fa-solid fa-scale-balanced" id="mainIcon"></i>
            <h1 id="mainTitle">Sistema Judiciário RP</h1>
            <div class="subtitle" id="mainSubtitle">Módulo de Despachos e Portes</div>
        </div>

        <!-- ================= MÓDULO 1: DESPACHOS ================= -->
        <div id="moduleDespachos" class="module-section active">
            <div class="form-group">
                <label for="statusSelect">SELECIONE O STATUS DO PROCESSO</label>
                <select id="statusSelect" onchange="toggleFields()">
                    <option value="1">🧠 STATUS: AGUARDANDO LAUDO PSICOLÓGICO</option>
                    <option value="2">🎯 STATUS: AGUARDANDO TESTE DE TIROS</option>
                    <option value="3">📄 STATUS: AGUARDANDO EMISSÃO E ENTREGA DO PORTE DE ARMA</option>
                    <option value="4">✅ STATUS: PORTE EMITIDO (SENTENÇA FINAL)</option>
                    <option value="5">👮 STATUS: AGENTE DE SEGURANÇA / POLICIAL (ISENTO DE TESTES)</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 25px 0;">

            <div class="form-group">
                <label for="nomeAutor">NOME DO AGENTE / AUTOR</label>
                <input type="text" id="nomeAutor" placeholder="Ex: Wandinha Addams">
            </div>

            <div class="form-group">
                <label for="passaporteAutor">PASSAPORTE / RE / MATRÍCULA</label>
                <input type="text" id="passaporteAutor" placeholder="Ex: 137081">
            </div>

            <div class="form-group">
                <label for="idAutor">ID DO DISCORD - REQUERENTE</label>
                <input type="text" id="idAutor" placeholder="Ex: 538874591083364383">
            </div>

            <!-- SELEÇÃO DE ADVOGADO -->
            <div class="form-group">
                <label for="selectAdvogado">SELECIONE O ADVOGADO</label>
                <select id="selectAdvogado" class="select-cadastrado" onchange="toggleManualInput('Advogado')">
                    <option value="manual">Outro (Digitar Manualmente abaixo)</option>
                </select>
                <div id="manualAdvogadoBox" class="manual-input-box">
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">NOME DO ADVOGADO MANUAL</label>
                        <input type="text" id="nomeAdvogadoManual" placeholder="Ex: Dr. Bruno Prado">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">PASSAPORTE MANUAL</label>
                        <input type="text" id="idInGameAdvogadoManual" placeholder="Ex: 115237">
                    </div>
                    <div>
                        <label style="font-size: 11px;">ID DO DISCORD - ADVOGADO MANUAL</label>
                        <input type="text" id="idAdvogadoManual" placeholder="Ex: 533273417290350613">
                    </div>
                </div>
            </div>

            <!-- SELEÇÃO DE JUIZ -->
            <div class="form-group">
                <label for="selectJuiz">SELECIONE O JUIZ</label>
                <select id="selectJuiz" class="select-cadastrado" onchange="toggleManualInput('Juiz')">
                    <option value="manual">Outro (Digitar Manualmente abaixo)</option>
                </select>
                <div id="manualJuizBox" class="manual-input-box">
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">NOME DO JUIZ MANUAL</label>
                        <input type="text" id="nomeJuizManual" placeholder="Ex: Magistrado. Zeca">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">PASSAPORTE MANUAL</label>
                        <input type="text" id="idInGameJuizManual" placeholder="Ex: 181871">
                    </div>
                    <div>
                        <label style="font-size: 11px;">ID DO DISCORD - JUIZ MANUAL</label>
                        <input type="text" id="idJuizManual" placeholder="Ex: 1223410694943150221">
                    </div>
                </div>
            </div>

            <!-- SELEÇÃO DE PSICÓLOGO -->
            <div class="form-group conditional-field" id="fieldPsicologoCompleto">
                <label for="selectPsicologo">SELECIONE O PSICÓLOGO</label>
                <select id="selectPsicologo" class="select-cadastrado" onchange="toggleManualInput('Psicologo')">
                    <option value="manual">Outro (Digitar Manualmente abaixo)</option>
                </select>
                <div id="manualPsicologoBox" class="manual-input-box">
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">NOME DO PSICÓLOGO MANUAL</label>
                        <input type="text" id="nomePsicologoManual" placeholder="Ex: Dra. Carine S.">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">PASSAPORTE MANUAL</label>
                        <input type="text" id="idInGamePsicologoManual" placeholder="Ex: 305">
                    </div>
                    <div>
                        <label style="font-size: 11px;">ID DO DISCORD - PSICÓLOGO MANUAL</label>
                        <input type="text" id="idPsicologoManual" placeholder="Ex: 1391560933297488035">
                    </div>
                </div>
            </div>

            <!-- SELEÇÃO DE INSTRUTOR DE TIROS -->
            <div class="form-group conditional-field" id="fieldTirosCompleto">
                <label for="selectTiros">SELECIONE O RESPONSÁVEL PELO TESTE DE TIROS</label>
                <select id="selectTiros" class="select-cadastrado" onchange="toggleManualInput('Tiros')">
                    <option value="manual">Outro (Digitar Manualmente abaixo)</option>
                </select>
                <div id="manualTirosBox" class="manual-input-box">
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">NOME DO RESP. TIROS MANUAL</label>
                        <input type="text" id="nomeTirosManual" placeholder="Ex: Hélio.">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">FUNÇÃO COGNITIVA / CARGO MANUAL (Ex: Delegado, Escrivão 4)</label>
                        <input type="text" id="funcaoTirosManual" placeholder="Ex: Delegado, Escrivão 4, Escrivão 3, Coordenador">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">PASSAPORTE MANUAL</label>
                        <input type="text" id="idInGameTirosManual" placeholder="Ex: 153565">
                    </div>
                    <div>
                        <label style="font-size: 11px;">ID DO DISCORD - RESP. TIROS MANUAL</label>
                        <input type="text" id="idTirosManual" placeholder="Ex: 699049464249319625">
                    </div>
                </div>
            </div>

            <div class="form-group conditional-field" id="fieldArmamento">
                <label for="txtArmamento">ARMAMENTO AUTORIZADO</label>
                <input type="text" id="txtArmamento" value="PX4 com 80 munições">
            </div>
        </div>

        <!-- ================= MÓDULO 2: CALCULADORA DE REABILITAÇÃO ================= -->
        <div id="moduleTaxas" class="module-section">
            <div id="prisaoContainer">
                <div class="prisaon-row">
                    <div class="inline-field">
                        <label>Horas</label>
                        <input type="number" class="input-horas" value="0" min="0" oninput="liveCalculateReab()">
                    </div>
                    <div class="inline-field">
                        <label>Minutos</label>
                        <input type="number" class="input-minutos" value="0" min="0" oninput="liveCalculateReab()">
                    </div>
                    <button class="btn-excluir" onclick="removePrisaoRow(this)">Excluir</button>
                </div>
            </div>
            <button class="btn-add-prisao" onclick="addPrisaoRow()">+ Adicionar Prisão</button>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 25px 0;">

            <div class="inline-group">
                <div style="flex: 1; min-width: 200px;">
                    <label for="selectReabJuiz">Juiz - Selecionar</label>
                    <select id="selectReabJuiz" class="select-cadastrado" onchange="toggleManualInput('ReabJuiz')">
                        <option value="manual">Outro (Digitar Manualmente)</option>
                    </select>
                    <div id="manualReabJuizBox" class="manual-input-box" style="margin-top:5px;">
                        <input type="text" id="reabJuizNomeManual" placeholder="Nome do Juiz" style="margin-bottom: 5px;">
                        <input type="text" id="reabJuizIdInGameManual" placeholder="Passaporte" style="margin-bottom: 5px;">
                        <input type="text" id="reabJuizIdManual" placeholder="ID Discord do Juiz">
                    </div>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label for="selectReabAdv">Advogado - Selecionar</label>
                    <select id="selectReabAdv" class="select-cadastrado" onchange="toggleManualInput('ReabAdv')">
                        <option value="manual">Outro (Digitar Manualmente)</option>
                    </select>
                    <div id="manualReabAdvBox" class="manual-input-box" style="margin-top:5px;">
                        <input type="text" id="reabAdvNomeManual" placeholder="Nome do Advogado" style="margin-bottom: 5px;">
                        <input type="text" id="reabAdvIdInGameManual" placeholder="Passaporte" style="margin-bottom: 5px;">
                        <input type="text" id="reabAdvIdManual" placeholder="ID Discord do Advogado">
                    </div>
                </div>
            </div>
            <div class="inline-group">
                <div style="flex: 2; min-width: 200px;">
                    <label>Nome Cliente</label>
                    <input type="text" id="reabClienteNome" placeholder="Ex: Henrique Jose">
                </div>
                <div style="flex: 1.5; min-width: 180px;">
                    <label>Cliente - ID Discord</label>
                    <input type="text" id="reabClienteId" placeholder="Ex: 780835619727212575">
                </div>
                <div style="flex: 1; min-width: 120px;">
                    <label>Cliente - Passaporte</label>
                    <input type="text" id="reabClienteRP" placeholder="Ex: 1982">
                </div>
            </div>
            <div class="live-counter">
                Meses: <span id="lblMeses">0</span> | Taxa: <span id="lblTaxa">R$ 0,00</span>
            </div>
        </div>

        <!-- ================= MÓDULO 3: GERENCIAMENTO DE EQUIPE ================= -->
        <div id="moduleGerenciamento" class="module-section">
            <div class="card-cadastro">
                <label style="color: var(--accent-color); margin-bottom: 15px;">➕ Cadastrar Novo Integrante (Nuvem em Tempo Real)</label>
                
                <div class="form-group">
                    <label for="cadTipo">Tipo de Cargo</label>
                    <select id="cadTipo" onchange="toggleCadFuncaoField()">
                        <option value="Juiz">Juiz</option>
                        <option value="Advogado">Advogado</option>
                        <option value="Psicologo">Psicólogo</option>
                        <option value="Tiros">Instrutor / Responsável por Tiros</option>
                    </select>
                </div>

                <div class="form-group" id="groupCadFuncao" style="display: none;">
                    <label for="cadFuncao">Função / Patente / Cargo Corporativo (Apenas p/ Instrutores de Tiros)</label>
                    <input type="text" id="cadFuncao" placeholder="Ex: Delegado, Escrivão 4, Escrivão 3, Coordenador">
                </div>

                <div class="form-group">
                    <label for="cadNome">Nome Completo / Prefixo</label>
                    <input type="text" id="cadNome" placeholder="Ex: Adv. Bruno, Juiz Zeca ou Psic. Carine">
                </div>

                <div class="form-group">
                    <label for="cadIdInGame">Passaporte</label>
                    <input type="text" id="cadIdInGame" placeholder="Ex: 137035">
                </div>

                <div class="form-group">
                    <label for="cadIdDiscord">ID do Discord</label>
                    <input type="text" id="cadIdDiscord" placeholder="Ex: 780835619727212575">
                </div>

                <button class="btn-add-membro" onclick="salvarNovoMembro()" style="width: 100%; margin-top: 10px;">Salvar em Nuvem Sincronizada</button>
            </div>

            <div class="form-group">
                <label>📋 Integrantes Cadastrados Atualmente (Nuvem Global em Tempo Real)</label>
                <div class="lista-cadastrados" id="listaMembrosVisual">
                    <div style="text-align: center; color: var(--accent-color); padding: 20px;">Sincronizando com a nuvem...</div>
                </div>
                
                <div class="btn-backup-container">
                    <button class="btn-backup" onclick="exportarBackupManual()"><i class="fa-solid fa-download"></i> Exportar Backup (.json)</button>
                    <button class="btn-backup" onclick="document.getElementById('fileImportInput').click()"><i class="fa-solid fa-upload"></i> Importar Backup (.json)</button>
                    <input type="file" id="fileImportInput" accept=".json" style="display: none;" onchange="importarBackupManual(event)">
                </div>
            </div>
        </div>

        <div class="btn-container" id="painelBotoesAcao">
            <button class="btn-generate" onclick="executeModuleAction()">Gerar Decisão</button>
            <button class="btn-clear" onclick="clearAll()">Limpar Tudo</button>
        </div>

        <div class="output-container" id="outputContainer">
            <div class="output-box-wrapper" id="wrapperTexto1">
                <div class="output-box-title" id="titleTexto1">Texto Judicial / Decisão:</div>
                <textarea id="outputText" readonly></textarea>
                <button class="mini-copy-btn" onclick="copySpecificText('outputText')">Copiar Texto Acima</button>
            </div>

            <div class="output-box-wrapper" id="wrapperTexto2" style="display: none;">
                <div class="output-box-title">Texto 2 - Registro de System / Logs:</div>
                <textarea id="outputText2" readonly style="height: 160px;"></textarea>
                <button class="mini-copy-btn" onclick="copySpecificText('outputText2')">Copiar Registro de Log</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fa-solid fa-check" style="color: #c5a880; margin-right: 8px;"></i> Operação concluída!</div>

    <!-- CONEXÃO COM O FIREBASE DA GOOGLE PARA SINCRONIZAÇÃO EM TEMPO REAL -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const SENHA_GERENCIAMENTO = "1385";
        
        const firebaseConfig = {
            databaseURL: "https://sistema-judiciario-rp-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let usuarioAutenticado = false;
        let currentModule = 'despachos';
        let dadosEquipe = { Juiz: [], Advogado: [], Psicologo: [], Tiros: [] };

        function verificarAutenticacao() {
            if (usuarioAutenticado) return true;
            const senhaDigitada = prompt("Insira a senha de acesso do Gerenciamento:");
            if (senhaDigitada === SENHA_GERENCIAMENTO) {
                usuarioAutenticado = true;
                return true;
            } else {
                alert("Senha Incorreta! Acesso negado.");
                return false;
            }
        }

        function toggleCadFuncaoField() {
            const tipo = document.getElementById("cadTipo").value;
            document.getElementById("groupCadFuncao").style.display = (tipo === "Tiros") ? "block" : "none";
        }

        database.ref('equipe').on('value', (snapshot) => {
            const dadosNuvemReal = snapshot.val();
            if (dadosNuvemReal) {
                dadosEquipe = {
                    Juiz: dadosNuvemReal.Juiz || [],
                    Advogado: dadosNuvemReal.Advogado || [],
                    Psicologo: dadosNuvemReal.Psicologo || [],
                    Tiros: dadosNuvemReal.Tiros || []
                };
            } else {
                dadosEquipe = { Juiz: [], Advogado: [], Psicologo: [], Tiros: [] };
            }
            atualizarSelectsEListas();
        });

        function salvarNaNuvem() {
            return database.ref('equipe').set(dadosEquipe);
        }

        function exportarBackupManual() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dadosEquipe, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "backup_sistema_judiciario_equipe.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            mostrarToast();
        }

        function importarBackupManual(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const jsonImportado = JSON.parse(e.target.result);
                    
                    if (jsonImportado.Juiz || jsonImportado.Advogado || jsonImportado.Psicologo || jsonImportado.Tiros) {
                        
                        dadosEquipe = {
                            Juiz: jsonImportado.Juiz || [],
                            Advogado: jsonImportado.Advogado || [],
                            Psicologo: jsonImportado.Psicologo || [],
                            Tiros: jsonImportado.Tiros || []
                        };
                        
                        database.ref('equipe').set(dadosEquipe, (error) => {
                            if (error) {
                                alert("Erro de conexão com o Firebase: " + error.message);
                            } else {
                                alert("Backup sincronizado com sucesso na sua Nuvem! Todos os navegadores foram atualizados em tempo real.");
                                mostrarToast();
                            }
                        });

                    } else {
                        alert("Formato de arquivo inválido! Verifique o arquivo selecionado.");
                    }
                } catch (err) {
                    alert("Erro ao decodificar o arquivo JSON.");
                }
            };
            reader.readAsText(file);
            event.target.value = ""; 
        }

        function verificarEAdicionarAutomatico(tipo, nome, idInGame, idDiscord, funcao = "") {
            if (!idDiscord || idDiscord.trim() === "" || !nome || nome.trim() === "") return false;
            
            const cleanIdD = idDiscord.trim();
            const cleanNome = nome.trim();
            const cleanIdIG = idInGame.trim();

            if (!dadosEquipe[tipo]) dadosEquipe[tipo] = [];
            
            const existe = dadosEquipe[tipo].some(m => m.id === cleanIdD);
            if (!existe) {
                dadosEquipe[tipo].push({ id: cleanIdD, nome: cleanNome, idInGame: cleanIdIG, funcao: funcao });
                return true;
            }
            return false;
        }

        async function salvarNovoMembro() {
            const tipo = document.getElementById("cadTipo").value;
            const nome = document.getElementById("cadNome").value.trim();
            const idInGame = document.getElementById("cadIdInGame").value.trim();
            const idDiscord = document.getElementById("cadIdDiscord").value.trim();
            const funcao = (tipo === "Tiros") ? document.getElementById("cadFuncao").value.trim() : "";

            if (!nome || !idDiscord || !idInGame) {
                alert("Por favor, preencha todos os campos obrigatórios!");
                return;
            }

            if(tipo === "Tiros" && !funcao) {
                alert("Por favor, preencha a função do instrutor!");
                return;
            }

            if(!dadosEquipe[tipo]) dadosEquipe[tipo] = [];

            const existe = dadosEquipe[tipo].some(m => m.id === idDiscord);
            if (existe) {
                alert("Este ID de Discord já está cadastrado neste cargo!");
                return;
            }

            dadosEquipe[tipo].push({ id: idDiscord, nome: nome, idInGame: idInGame, funcao: funcao });
            
            document.getElementById("cadNome").value = "";
            document.getElementById("cadIdInGame").value = "";
            document.getElementById("cadIdDiscord").value = "";
            document.getElementById("cadFuncao").value = "";
            
            await salvarNaNuvem();
            mostrarToast();
        }

        async function removerMembro(tipo, index) {
            if (!verificarAutenticacao()) return;
            dadosEquipe[tipo].splice(index, 1);
            await salvarNaNuvem();
        }

        function atualizarSelectsEListas() {
            const tipos = ['Juiz', 'Advogado', 'Psicologo', 'Tiros'];
            
            tipos.forEach(tipo => {
                const select = document.getElementById(`select${tipo}`);
                if (select) {
                    const valorAtual = select.value;
                    select.innerHTML = '<option value="manual">Outro (Digitar Manualmente abaixo)</option>';
                    
                    if(dadosEquipe[tipo]) {
                        dadosEquipe[tipo].forEach(membro => {
                            const opt = document.createElement('option');
                            opt.value = membro.id; 
                            opt.setAttribute('data-nome', membro.nome);
                            opt.setAttribute('data-ingame', membro.idInGame || "");
                            opt.setAttribute('data-funcao', membro.funcao || "");
                            
                            let labelExibicao = `${membro.nome} (Passaporte: ${membro.idInGame || 'N/I'})`;
                            if (tipo === 'Tiros' && membro.funcao) {
                                labelExibicao = `${membro.nome} (${membro.funcao}) (Passaporte: ${membro.idInGame})`;
                            }
                            opt.innerText = labelExibicao;
                            select.appendChild(opt);
                        });
                    }
                    
                    if (valorAtual && select.querySelector(`option[value="${valorAtual}"]`)) {
                        select.value = valorAtual;
                    } else if (select.options.length > 1) {
                        select.value = select.options[1].value;
                    } else {
                        select.value = "manual";
                    }
                    
                    toggleManualInput(tipo);
                }
            });

            const selectReabJuiz = document.getElementById("selectReabJuiz");
            if (selectReabJuiz) {
                const valJuiz = selectReabJuiz.value;
                selectReabJuiz.innerHTML = '<option value="manual">Outro (Digitar Manualmente abaixo)</option>';
                if(dadosEquipe['Juiz']) {
                    dadosEquipe['Juiz'].forEach(membro => {
                        const opt = document.createElement('option');
                        opt.value = membro.id;
                        opt.setAttribute('data-nome', membro.nome);
                        opt.setAttribute('data-ingame', membro.idInGame || "");
                        opt.innerText = `${membro.nome} (Passaporte: ${membro.idInGame || 'N/I'})`;
                        selectReabJuiz.appendChild(opt);
                    });
                }
                
                if (valJuiz && selectReabJuiz.querySelector(`option[value="${valJuiz}"]`)) {
                    selectReabJuiz.value = valJuiz;
                } else if (selectReabJuiz.options.length > 1) {
                    selectReabJuiz.value = selectReabJuiz.options[1].value;
                } else {
                    selectReabJuiz.value = "manual";
                }
                toggleManualInput('ReabJuiz');
            }

            const selectReabAdv = document.getElementById("selectReabAdv");
            if (selectReabAdv) {
                const valAdv = selectReabAdv.value;
                selectReabAdv.innerHTML = '<option value="manual">Outro (Digitar Manualmente abaixo)</option>';
                if(dadosEquipe['Advogado']) {
                    dadosEquipe['Advogado'].forEach(membro => {
                        const opt = document.createElement('option');
                        opt.value = membro.id;
                        opt.setAttribute('data-nome', membro.nome);
                        opt.setAttribute('data-ingame', membro.idInGame || "");
                        opt.innerText = `${membro.nome} (Passaporte: ${membro.idInGame || 'N/I'})`;
                        selectReabAdv.appendChild(opt);
                    });
                }
                
                if (valAdv && selectReabAdv.querySelector(`option[value="${valAdv}"]`)) {
                    selectReabAdv.value = valAdv;
                } else if (selectReabAdv.options.length > 1) {
                    selectReabAdv.value = selectReabAdv.options[1].value;
                } else {
                    selectReabAdv.value = "manual";
                }
                toggleManualInput('ReabAdv');
            }

            const listaVisual = document.getElementById("listaMembrosVisual");
            if(listaVisual) {
                listaVisual.innerHTML = "";
                let total = 0;
                
                const mapeamentoCategorias = {
                    'Juiz': '⚖️ Juízes Magistrados',
                    'Advogado': '💼 Advogados / Defensores',
                    'Psicologo': '🧠 Psicólogos Peritos',
                    'Tiros': '🎯 Instrutores / Responsáveis por Teste de Tiro'
                };

                tipos.forEach(tipo => {
                    const membrosFiltrados = dadosEquipe[tipo] || [];
                    if(membrosFiltrados.length > 0) {
                        const tituloCategoria = document.createElement('div');
                        tituloCategoria.className = "categoria-titulo";
                        tituloCategoria.innerText = mapeamentoCategorias[tipo];
                        listaVisual.appendChild(tituloCategoria);

                        membrosFiltrados.forEach((membro, index) => {
                            total++;
                            const div = document.createElement('div');
                            div.className = "item-membro";
                            let prefixoDinamico = tipo === "Tiros" && membro.funcao ? `[${membro.funcao.toUpperCase()}]` : `[${tipo.toUpperCase()}]`;
                            div.innerHTML = `
                                <span><strong>${prefixoDinamico}</strong> ${membro.nome} (Passaporte: ${membro.idInGame || 'N/I'}) (Discord: ${membro.id})</span>
                                <button class="btn-mini-excluir" onclick="removerMembro('${tipo}', ${index})"><i class="fa-solid fa-trash-can"></i> Remover</button>
                            `;
                            listaVisual.appendChild(div);
                        });
                    }
                });

                if(total === 0) {
                    listaVisual.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">Nenhum integrante cadastrado ainda.</div>';
                }
            }
        }

        function toggleManualInput(tipo) {
            const select = document.getElementById(`select${tipo}`);
            const box = document.getElementById(`manual${tipo}Box`);
            if (select && select.value === "manual") {
                if(box) box.style.display = "block";
            } else if (box) {
                box.style.display = "none";
            }
        }

        function formatMention(id) {
            if (!id || id.trim() === "") return "(Não informado)";
            let cleanId = id.trim();
            if (cleanId.startsWith("<@") && cleanId.endsWith(">")) return cleanId;
            return `<@${cleanId}>`;
        }

        function switchModule(moduleName, element) {
            if (moduleName === 'gerenciamento') {
                if (!verificarAutenticacao()) return;
            }

            currentModule = moduleName;
            document.querySelectorAll('.nav-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            document.querySelectorAll('.module-section').forEach(sec => sec.classList.remove('active'));
            
            const title = document.getElementById('mainTitle');
            const subtitle = document.getElementById('mainSubtitle');
            const icon = document.getElementById('mainIcon');
            const painelBotoes = document.getElementById('painelBotoesAcao');

            painelBotoes.style.display = "flex";

            if (moduleName === 'despachos') {
                document.getElementById('moduleDespachos').classList.add('active');
                title.innerText = "Sistema Judiciário RP";
                subtitle.innerText = "Módulo de Despachos e Portes";
                icon.className = "fa-solid fa-scale-balanced";
            } else if (moduleName === 'taxas') {
                document.getElementById('moduleTaxas').classList.add('active');
                title.innerText = "Calculadora de Taxa de Reabilitação";
                subtitle.innerText = "Cálculo de Penas e Taxas de Limpeza";
                icon.className = "fa-solid fa-calculator";
                liveCalculateReab();
            } else {
                document.getElementById('moduleGerenciamento').classList.add('active');
                title.innerText = "Gerenciamento da Equipe";
                subtitle.innerText = "Cadastre ou remova Juízes, Advogados, Psicólogos e Instrutores";
                icon.className = "fa-solid fa-users-gear";
                painelBotoes.style.display = "none";
                toggleCadFuncaoField();
            }
            
            document.getElementById("outputContainer").style.display = "none";
            atualizarSelectsEListas();
        }

        function toggleFields() {
            const status = document.getElementById("statusSelect").value;
            document.getElementById("fieldPsicologoCompleto").style.display = (status === "2" || status === "3") ? "block" : "none";
            document.getElementById("fieldTirosCompleto").style.display = (status === "3") ? "block" : "none";
            document.getElementById("fieldArmamento").style.display = (status === "4" || status === "5") ? "block" : "none";
        }

        function addPrisaoRow() {
            const container = document.getElementById("prisaoContainer");
            const newRow = document.createElement("div");
            newRow.className = "prisaon-row";
            newRow.innerHTML = `
                <div class="inline-field">
                    <label>Horas</label>
                    <input type="number" class="input-horas" value="0" min="0" oninput="liveCalculateReab()">
                </div>
                <div class="inline-field">
                    <label>Minutos</label>
                    <input type="number" class="input-minutos" value="0" min="0" oninput="liveCalculateReab()">
                </div>
                <button class="btn-excluir" onclick="removePrisaoRow(this)">Excluir</button>
            `;
            container.appendChild(newRow);
            liveCalculateReab();
        }

        function removePrisaoRow(button) {
            button.parentElement.remove();
            liveCalculateReab();
        }

        function liveCalculateReab() {
            let totalMinutos = 0;
            document.querySelectorAll(".prisaon-row").forEach(row => {
                const horas = parseInt(row.querySelector(".input-horas").value) || 0;
                const minutes = parseInt(row.querySelector(".input-minutos").value) || 0;
                totalMinutos += (horas * 60) + minutes;
            });
            const meses = totalMinutos;
            const taxaTotal = meses * 28000;
            document.getElementById("lblMeses").innerText = meses;
            document.getElementById("lblTaxa").innerText = "R$ " + taxaTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return { meses, taxaTotal };
        }

        async function executeModuleAction() {
            let houveMudancaNuvem = false;

            if (currentModule === 'despachos') {
                if(document.getElementById("selectJuiz").value === "manual"){
                    const nomeJ = document.getElementById("nomeJuizManual").value;
                    const idInGameJ = document.getElementById("idInGameJuizManual").value;
                    const idJ = document.getElementById("idJuizManual").value;
                    if(verificarEAdicionarAutomatico("Juiz", nomeJ || ("Juiz " + idInGameJ), idInGameJ, idJ)) houveMudancaNuvem = true;
                }
                if(document.getElementById("selectAdvogado").value === "manual"){
                    const nomeA = document.getElementById("nomeAdvogadoManual").value;
                    const idInGameA = document.getElementById("idInGameAdvogadoManual").value;
                    const idA = document.getElementById("idAdvogadoManual").value;
                    if(verificarEAdicionarAutomatico("Advogado", nomeA, idInGameA, idA)) houveMudancaNuvem = true;
                }
                
                const status = document.getElementById("statusSelect").value;
                if((status === "2" || status === "3") && document.getElementById("selectPsicologo").value === "manual"){
                    const nomeP = document.getElementById("nomePsicologoManual").value;
                    const idInGameP = document.getElementById("idInGamePsicologoManual").value;
                    const idP = document.getElementById("idPsicologoManual").value;
                    if(verificarEAdicionarAutomatico("Psicologo", nomeP, idInGameP, idP)) houveMudancaNuvem = true;
                }
                if(status === "3" && document.getElementById("selectTiros").value === "manual"){
                    const nomeT = document.getElementById("nomeTirosManual").value;
                    const funcaoT = document.getElementById("funcaoTirosManual").value || "Instrutor";
                    const idInGameT = document.getElementById("idInGameTirosManual").value;
                    const idT = document.getElementById("idTirosManual").value;
                    if(verificarEAdicionarAutomatico("Tiros", nomeT || ("Instrutor " + idInGameT), idInGameT, idT, funcaoT)) houveMudancaNuvem = true;
                }

                generateDespacho();

            } else if (currentModule === 'taxas') {
                if(document.getElementById("selectReabJuiz").value === "manual"){
                    const nomeRJ = document.getElementById("reabJuizNomeManual").value;
                    const idInGameRJ = document.getElementById("reabJuizIdInGameManual").value;
                    const idRJ = document.getElementById("reabJuizIdManual").value;
                    if(verificarEAdicionarAutomatico("Juiz", nomeRJ || ("Juiz " + idInGameRJ), idInGameRJ, idRJ)) houveMudancaNuvem = true;
                }
                if(document.getElementById("selectReabAdv").value === "manual"){
                    const nomeRA = document.getElementById("reabAdvNomeManual").value;
                    const idInGameRA = document.getElementById("reabAdvIdInGameManual").value;
                    const idRA = document.getElementById("reabAdvIdManual").value;
                    if(verificarEAdicionarAutomatico("Advogado", nomeRA, idInGameRA, idRA)) houveMudancaNuvem = true;
                }

                generateReabDecision();
            }

            if(houveMudancaNuvem) {
                await salvarNaNuvem();
            }
        }

        function getMembroDataEx(tipo, prefixoElemento) {
            const select = document.getElementById(`select${prefixoElemento}`);
            if (!select || select.value === "manual") {
                let nomeId = tipo === "Juiz" ? "nomeJuizManual" : "nomeAdvogadoManual";
                let passaporteId = tipo === "Juiz" ? "idInGameJuizManual" : "idInGameAdvogadoManual";
                let discordId = tipo === "Juiz" ? "idJuizManual" : "idAdvogadoManual";

                if (prefixoElemento === "ReabJuiz") {
                    nomeId = "reabJuizNomeManual"; passaporteId = "reabJuizIdInGameManual"; discordId = "reabJuizIdManual";
                } else if (prefixoElemento === "ReabAdv") {
                    nomeId = "reabAdvNomeManual"; passaporteId = "reabAdvIdInGameManual"; discordId = "reabAdvIdManual";
                } else if (tipo === "Psicologo") {
                    nomeId = "nomePsicologoManual"; passaporteId = "idInGamePsicologoManual"; discordId = "idPsicologoManual";
                } else if (tipo === "Tiros") {
                    nomeId = "nomeTirosManual"; passaporteId = "idInGameTirosManual"; discordId = "idTirosManual";
                }

                return {
                    id: document.getElementById(discordId).value,
                    idInGame: document.getElementById(passaporteId).value || "N/I",
                    nome: document.getElementById(nomeId).value || `**${tipo.toUpperCase()}**`,
                    funcao: tipo === "Tiros" ? (document.getElementById("funcaoTirosManual").value || "Instrutor de Tiros") : ""
                };
            } else {
                const selectedOption = select.options[select.selectedIndex];
                return {
                    id: select.value,
                    idInGame: selectedOption.getAttribute("data-ingame") || "N/I",
                    nome: selectedOption.getAttribute("data-nome") || selectedOption.text,
                    funcao: selectedOption.getAttribute("data-funcao") || ""
                };
            }
        }

        function generateDespacho() {
            const status = document.getElementById("statusSelect").value;
            const nomeAutor = document.getElementById("nomeAutor").value || "**NOME DO REQUERENTE**";
            const passaporte = document.getElementById("passaporteAutor").value || "000000";
            const armamento = document.getElementById("txtArmamento").value || "PX4 com 80 munições";
            const idAutor = formatMention(document.getElementById("idAutor").value);

            const dadosJuiz = getMembroDataEx("Juiz", "Juiz");
            const dadosAdvogado = getMembroDataEx("Advogado", "Advogado");
            const dadosPsicologo = getMembroDataEx("Psicologo", "Psicologo");
            const dadosTiros = getMembroDataEx("Tiros", "Tiros");

            const idJuiz = formatMention(dadosJuiz.id);
            const idAdvogado = formatMention(dadosAdvogado.id);
            const idPsicologo = formatMention(dadosPsicologo.id);
            const idTiros = formatMention(dadosTiros.id);

            let finalText = "";
            document.getElementById("wrapperTexto2").style.display = "none";
            document.getElementById("titleTexto1").innerText = "Texto Judicial / Decisão:";

            if (status === "1") {
                finalText = `**DESPACHO - ANÁLISE PRELIMINAR**\n\nVistos, etc.\n\nTrata-se de pedido de Emissão de Porte de Arma solicitado por **${nomeAutor}** (Passaporte: ${passaporte}), representado por seu advogado.\n\nVerifico que o requerente atende aos requisitos preliminares para prosseguimento do feito.\n\nPortanto, **DECIDO: DEFIRO** o prosseguimento do pedido e determino o encaminhamento para Avaliação Psicológica.\n\n🧠 **STATUS: AGUARDANDO LAUDO PSICOLÓGICO**\n\n---\n\n**Juiz:** ${idJuiz}\n**Advogado:** ${idAdvogado}\n**Autor/Requerente:** ${nomeAutor} | ${idAutor}\n\nNada mais.`;
            } else if (status === "2") {
                finalText = `**DESPACHO - ANÁLISE DE LAUDO**\n\nVistos, etc.\n\nTrata-se de pedido de Emissão de Porte de Arma solicitado por **${nomeAutor}** (Passaporte: ${passaporte}).\n\nConsta nos autos laudo psicológico favorável, considerando o requerente **APTO** para prosseguimento do processo.\n\nDiante do exposto, determino o encaminhamento para realização do Teste Prático de Manuseio e Disparo de Arma de Fogo.\n\n🎯 **STATUS: AGUARDANDO TESTE DE TIROS**\n\n---\n\n**Juiz:** ${idJuiz}\n**Advogado:** ${idAdvogado}\n**Psicólogo Responsável:** ${idPsicologo}\n**Autor/Requerente:** ${nomeAutor} | ${idAutor}\n\nNada mais.`;
            } else if (status === "3") {
                finalText = `**DESPACHO - ANÁLISE FINAL**\n\nVistos, etc.\n\nTrata-se de pedido de Emissão de Porte de Arma solicitado por **${nomeAutor}** (Passaporte: ${passaporte}).\n\nVerifico que o requerente foi considerado **APTO** na Avaliação Psicológica e **APROVADO** no Teste Prático de Manuseio e Disparo de Arma de Fogo, cumprindo integralmente todas as exigências previstas.\n\nDiante da inexistência de pendências, determino a emissão e posterior entrega do Porte de Arma ao requerente.\n\n📄 **STATUS: AGUARDANDO EMISSÃO E ENTREGA DO PORTE DE ARMA**\n\n---\n\n**Juiz:** ${idJuiz}\n**Advogado:** ${idAdvogado}\n**Psicólogo Responsável:** ${idPsicologo}\n**Responsável Teste de Tiros:** ${idTiros}\n**Autor/Requerente:** ${nomeAutor} | ${idAutor}\n\nNada mais.`;
            } else if (status === "4") {
                finalText = `**⚖️ SENTENÇA FINAL - DEFERIMENTO**\n\n` +
                            `**Vistos, etc.** Constato cumpridos os requisitos fundamentais e **HOMOLOGO** formalmente a emissão de porte de arma ao solicitante.\n\n` +
                            `**DETERMINAÇÕES FINAIS:**\n` +
                            `1. **DETERMINO** a imediata liberação da eficácia do porte de arma.\n` +
                            `2. Convoco o requerente para comparecer às repartições competentes da cidade para entrega física do documento.\n\n` +
                            `Dou o processo por **CONCLUÍDO**. Arquive-se. ✅\n\n` +
                            `**STATUS: PORTE EMITIDO**\n\n` +
                            `---\n` +
                            `**Juiz:** ${idJuiz}\n` +
                            `**Advogado:** ${idAdvogado}\n` +
                            `**Cliente/Portador:** ${nomeAutor} (Passaporte: ${passaporte}) | ${idAutor}`;

                const hoje = new Date();
                const dataFormatada = hoje.toLocaleDateString('pt-BR');
                
                let textLog = `NOME: ${nomeAutor} - ${idAutor}\n` +
                             `PASSAPORTE: ${passaporte}\n` +
                             `ARMAMENTO: ${armamento}\n` +
                             `AUTORIZADO POR : ${dadosJuiz.nome} (Passaporte: ${dadosJuiz.idInGame})\n` +
                             `FINALIZADO: ${dataFormatada}\n\n` +
                             `VALIDO EM TODO TERRITÓRIO NACIONAL\n` +
                             `OBS: A autorização perderá eficácia caso detido/embriagado/drogado.`;

                document.getElementById("outputText2").value = textLog;
                document.getElementById("wrapperTexto2").style.display = "block";
                document.getElementById("titleTexto1").innerText = "Texto 1 - Sentença Final:";
            } else if (status === "5") {
                // MODELO ATUALIZADO: AMPLO PARA TODAS AS FORÇAS DE SEGURANÇA
                finalText = `**⚖️ SENTENÇA DE DEFERIMENTO - PORTE DE ARMA (PRERROGATIVA DE FUNÇÃO / CORPORATIVO)**\n\n` +
                            `**Vistos, etc.**\n\n` +
                            `Trata-se de procedimento legal voltado à validação e homologação de Porte de Arma de Fogo de uso pessoal a membro ativo das Forças de Segurança Pública (Polícia Civil, Militar, Federal, entre outras).\n\n` +
                            `Considerando o cargo exercido pelo requerente **${nomeAutor}** (Passaporte/RE: ${passaporte}), bem como o ordenamento jurídico vigente que reconhece a aptidão técnica, tática e psicológica intrínseca à sua atividade policial/corporativa, declaro sua **ISENÇÃO INTEGRAL** da realização de exames complementares externos de tiro ou laudos periciais civis adicionais.\n\n` +
                            `Diante do exposto, por prerrogativa de função, **DEFIRO** o pedido formulado e confirmo a regularidade do Porte de Arma Definitivo.\n\n` +
                            `👮 **STATUS: PORTE EMITIDO (ISENTO DE TESTES POR FUNÇÃO)**\n\n` +
                            `---\n` +
                            `**Juiz:** ${idJuiz}\n` +
                            `**Advogado/Defensor:** ${idAdvogado}\n` +
                            `**Agente de Segurança:** ${nomeAutor} (Passaporte: ${passaporte}) | ${idAutor}`;

                const hoje = new Date();
                const dataFormatada = hoje.toLocaleDateString('pt-BR');
                
                let textLog = `NOME: ${nomeAutor} - ${idAutor}\n` +
                             `PASSAPORTE/RE: ${passaporte}\n` +
                             `ARMAMENTO: ${armamento}\n` +
                             `HOMOLOGADO POR: ${dadosJuiz.nome} (Passaporte: ${dadosJuiz.idInGame})\n` +
                             `FINALIZADO: ${dataFormatada}\n\n` +
                             `VALIDO EM TODO TERRITÓRIO NACIONAL\n` +
                             `OBS: Isento de testes práticos/psicológicos civis por prerrogativa de função policial/civil/militar/agente público.`;

                document.getElementById("outputText2").value = textLog;
                document.getElementById("wrapperTexto2").style.display = "block";
                document.getElementById("titleTexto1").innerText = "Texto 1 - Sentença de Isenção Corporal:";
            }

            document.getElementById("outputText").value = finalText;
            document.getElementById("outputContainer").style.display = "block";
        }

        function generateReabDecision() {
            const dataData = liveCalculateReab();
            
            const dadosJuiz = getMembroDataEx("Juiz", "ReabJuiz");
            const dadosAdvogado = getMembroDataEx("Advogado", "ReabAdv");

            const juizM = formatMention(dadosJuiz.id);
            const advM = formatMention(dadosAdvogado.id);
            const clienteM = formatMention(document.getElementById("reabClienteId").value);
            const clienteNome = document.getElementById("reabClienteNome").value || "Nome do Cliente";
            const clienteRP = document.getElementById("reabClienteRP").value || "0000";

            const valorFormatado = "R$ " + dataData.taxaTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById("wrapperTexto2").style.display = "none";
            document.getElementById("titleTexto1").innerText = "Texto Judicial / Decisão:";

            let output = `**⚖️ DECISÃO INTERLOCUTÓRIA - CÁLCULO DE TAXA**\n\n` +
                         `Constato a Aptidão do requerente no Laudo anexado aos autos.\n\n` +
                         `Meses Válidos para Limpeza de Ficha: ${dataData.meses} meses.\n\n` +
                         `**VALOR DA TAXA DE REABILITAÇÃO: ${valorFormatado}**\n\n` +
                         `DETERMINO o prazo improrrogável de até 3 dias para que o pagamento integral seja efetivado diretamente ao Juiz ${juizM} ${dadosJuiz.nome} | ${dadosJuiz.idInGame}\n\n` +
                         `---\n\n` +
                         `**Juiz:** ${juizM}\n` +
                         `**Advogado:** ${advM}\n` +
                         `**Requerente/Cliente:** ${clienteNome} (Passaporte: ${clienteRP}) | ${clienteM}`;

            document.getElementById("outputText").value = output;
            document.getElementById("outputContainer").style.display = "block";
        }

        function copySpecificText(elementId) {
            const textarea = document.getElementById(elementId);
            if (!textarea.value) return;
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(textarea.value);
            mostrarToast();
        }

        function mostrarToast() {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }
